extends: default

rules:
  # GitHub Actions uses `on:` as a top-level key; yamllint flags it as a truthy
  # boolean. Disable the rule rather than quote every workflow key.
  truthy:
    check-keys: false
  # The "---" document-start marker is optional for our config files.
  document-start: disable
  # We prefer prettier-style 100 char line length.
  line-length:
    max: 120
    level: warning
  # Allow comments to start without a leading space (common in CI files).
  comments:
    require-starting-space: false
    min-spaces-from-content: 1

ignore: |
  node_modules/
  .wrangler/
  dist/
