name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  packages: read
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    uses: nyuchi/.github/.github/workflows/reusable-release.yml@main
    permissions:
      contents: write
      packages: read
      id-token: write
