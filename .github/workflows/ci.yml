name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - run: npm ci

      - run: npm run type-check

      - run: npm test

      - run: npx wrangler deploy --dry-run --outdir=.wrangler/dryrun

      # Fundi worker (fundi/) — its own type-check, tests, and bundle.
      - run: npm run type-check:fundi

      - run: npm run test:fundi

      - run: npx wrangler deploy -c fundi/wrangler.jsonc --dry-run --outdir=.wrangler/dryrun-fundi
