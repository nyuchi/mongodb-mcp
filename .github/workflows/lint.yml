name: lint

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - name: Run actionlint
        run: |
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color

  json:
    name: JSON validity
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Install jsonc-parser
        run: npm install --no-save --no-audit --no-fund jsonc-parser@3.3.1
      - name: Validate every JSON / JSONC file parses
        run: node .github/scripts/validate-json.mjs

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Run markdownlint-cli2
        run: npx --yes markdownlint-cli2@0.22.1 "**/*.md" "#node_modules" "#.wrangler" "#dist"

  prettier:
    name: prettier
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Check formatting with prettier
        run: npx --yes prettier@3.8.3 --check "**/*.{ts,mts,js,mjs,json,jsonc,md,yml,yaml}"

  yamllint:
    name: yamllint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - name: Install yamllint
        run: pipx install yamllint==1.38.0 || pip install --user yamllint==1.38.0
      - name: Run yamllint
        run: yamllint -c .yamllint.yml .
