name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly CodeQL/secret refresh to catch issues found after the PR window.
    - cron: "27 5 * * 1"

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # CodeQL is handled by GitHub's Default Setup (Settings → Code security
  # & analysis → CodeQL analysis). Running an advanced workflow here would
  # conflict with that — "CodeQL analyses from advanced configurations
  # cannot be processed when the default setup is enabled." Switch the
  # setting to "Advanced" if you want to manage queries/schedule in code.
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

  gitleaks:
    name: gitleaks
    # Use the open-source gitleaks CLI directly rather than gitleaks-action@v2,
    # which requires a paid license key for organization-owned repositories.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          set -euo pipefail
          version="8.21.2"
          curl -fsSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tgz
          tar -xzf /tmp/gitleaks.tgz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Scan repository
        run: gitleaks detect --source . --config .gitleaks.toml --redact --verbose --no-banner
